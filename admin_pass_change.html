<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 비밀번호 변경</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
      background-color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      border-radius: 6px;
      width: 480px;
      max-width: 96vw;
      padding: 48px 48px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .card-title {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.75;
      color: #555;
      text-align: center;
      margin-bottom: 36px;
    }

    .field-group { margin-bottom: 22px; }

    .field-group label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 7px;
      letter-spacing: 0.03em;
    }

    .field-group input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      color: #333;
      background: #fafafa;
      transition: border-color .2s, background .2s;
    }
    .field-group input:focus { border-color: #888; background: #fff; }
    .field-group input::placeholder { color: #bbb; }

    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      line-height: 1.6;
    }

    .error-msg {
      font-size: 13px;
      color: #c0392b;
      min-height: 18px;
      margin-bottom: 16px;
      text-align: center;
    }

    .success-msg {
      font-size: 14px;
      color: #27ae60;
      min-height: 18px;
      margin-bottom: 16px;
      text-align: center;
    }

    .btn-row { display: flex; gap: 12px; margin-top: 8px; }

    .btn-row button {
      flex: 1;
      padding: 14px 0;
      font-size: 15px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-row button:hover { opacity: .85; }
    .btn-row button:disabled { opacity: .45; cursor: default; }

    .btn-cancel  { background: #fff; border: 1.5px solid #ccc; color: #333; }
    .btn-confirm { background: #1e1e1e; border: none; color: #fff; }
  </style>
</head>
<body>

<div class="card">
  <p class="card-title">
    최초 로그인 하셨습니다.<br>
    보안을 위해 로그인 비밀번호를 변경해주세요.
  </p>

  <div class="field-group">
    <label>e-mail</label>
    <input type="email" id="pcEmail" placeholder="이메일 주소를 입력해주세요." autocomplete="username" />
  </div>

  <div class="field-group">
    <label>현재 패스워드</label>
    <input type="password" id="pcCurrent" placeholder="현재 패스워드를 입력해주세요." autocomplete="current-password" />
  </div>

  <div class="field-group">
    <label>변경 패스워드</label>
    <input type="password" id="pcNew" placeholder="새로운 패스워드를 입력해주세요." autocomplete="new-password" />
  </div>

  <div class="field-group">
    <label>변경 패스워드 (확인)</label>
    <input type="password" id="pcNewConfirm" placeholder="새로운 패스워드를 입력해주세요." autocomplete="new-password" />

  </div>

  <p class="error-msg"   id="errorMsg"></p>
  <p class="success-msg" id="successMsg"></p>

  <div class="btn-row">
    <button class="btn-confirm" id="confirmBtn">확인 (Confirm)</button>
    <button class="btn-cancel"  id="cancelBtn">취소 (Cancel)</button>
  </div>
</div>

<script>
  /* ── 설정 ── */
  // ★ 아래 GAS_URL 을 배포 후 발급된 웹앱 URL로 교체하세요
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz2efw4LV9gavToM5x9mIj7xi2dzW4BlfPOsilHtR1TU9PfYAjBnS6zPIgtT1FsNpys/exec';

  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTkDVzf4EpV7PqZSd-IkSKDbJznhnuABEjcOddp0HCsRqPIVjsbpiAqjdPPn03A1Amp8XzUTbhUwXx-/pub?gid=0&single=true&output=csv';



  /* ── 세션에서 이메일 자동 채우기 ── */
  const savedEmail = sessionStorage.getItem('adminEmail') || '';
  const emailInput = document.getElementById('pcEmail');
  emailInput.value = savedEmail;
  if (savedEmail) emailInput.readOnly = true;
  // 현재 패스워드 필드는 항상 빈 상태(placeholder만 표시)

  const errorEl   = document.getElementById('errorMsg');
  const successEl = document.getElementById('successMsg');
  const confirmBtn = document.getElementById('confirmBtn');
  const cancelBtn  = document.getElementById('cancelBtn');

  cancelBtn.addEventListener('click', () => { location.href = 'admin_mng-01.html'; });

  /* ── CSV 파싱 ── */
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      const row = {};
      headers.forEach((h, i) => row[h] = (cols[i] || '').replace(/^"|"$/g, ''));
      return row;
    });
  }

  /* ── 확인 버튼 ── */
  confirmBtn.addEventListener('click', async () => {
    errorEl.textContent   = '';
    successEl.textContent = '';

    const email      = emailInput.value.trim();
    const currentPw  = document.getElementById('pcCurrent').value;
    const newPw      = document.getElementById('pcNew').value;
    const newPwConf  = document.getElementById('pcNewConfirm').value;

    // 유효성 검사
    if (!email || !currentPw || !newPw || !newPwConf) {
      errorEl.textContent = '모든 항목을 입력해주세요.'; return;
    }
if (newPw !== newPwConf) {
      errorEl.textContent = '새 패스워드와 확인 패스워드가 일치하지 않습니다.'; return;
    }
    if (newPw === currentPw) {
      errorEl.textContent = '새 패스워드는 현재 패스워드와 달라야 합니다.'; return;
    }

    confirmBtn.disabled = true;
    confirmBtn.textContent = '처리 중…';

    try {
      // 1) 현재 CSV에서 계정 검증
      const res  = await fetch(CSV_URL);
      const text = await res.text();
      const rows = parseCSV(text);
      const user = rows.find(r => r['e-mail'] === email);

      if (!user) { errorEl.textContent = '등록되지 않은 이메일입니다.'; return; }
      if (user['password'] !== currentPw) { errorEl.textContent = '현재 패스워드가 올바르지 않습니다.'; return; }

      // 2) GAS 웹앱으로 패스워드 업데이트 요청
      const gasRes = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'changeAdminPassword', email, newPassword: newPw }),
        mode: 'no-cors'   // GAS 웹앱은 no-cors 로 요청
      });

      // no-cors 는 응답 body를 읽을 수 없으므로 성공으로 간주
      successEl.textContent = '비밀번호가 성공적으로 변경되었습니다. 잠시 후 관리 페이지로 이동합니다.';
      setTimeout(() => { location.href = 'admin_mng-01.html'; }, 2000);

    } catch (err) {
      errorEl.textContent = '처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
      console.error(err);
    } finally {
      confirmBtn.disabled = false;
      confirmBtn.textContent = '확인 (Confirm)';
    }
  });
</script>

</body>
</html>
