<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Process Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5; min-height: 100vh; padding: 32px;
    }

    /* ── 상단 바 ── */
    .top-bar {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 8px; margin-bottom: 16px;
    }
    .top-bar-email {
      font-size: 16.9px; color: #555; margin-right: auto;
      padding: 7px 4px;
    }
    .top-bar button {
      height: 34px;
      padding: 0 18px; font-size: 13px; background: #fff;
      border: 1px solid #bbb; border-radius: 4px;
      cursor: pointer; transition: background .15s; white-space: nowrap;
      line-height: 1;
    }
    .top-bar button:hover { background: #e8e8e8; }

    /* ── 테이블 ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 13px; background: #fff; border: 1px solid #ccc;
    }
    th, td { border: 1px solid #ccc; text-align: center; vertical-align: middle; padding: 0; }
    th:last-child, td:last-child { border-right: none; }

    .th-title { font-size: 15px; font-weight: bold; padding: 14px 20px; background: #fff; }

    /* ── 헤더 설문 셀: 2열 구조 (드롭다운|Save / 상태뱃지) ── */
    .th-survey {
      font-size: 13px; font-weight: bold; padding: 10px 0; background: #fff;
    }
    /* 헤더 설문 셀 내부를 2행으로 */
    .th-survey-inner {
      display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 10px;
    }
    .th-survey-label { font-size: 13px; font-weight: bold; }

    /* status 뱃지 (더 크고 뚜렷하게) */
    .status-badge {
      display: inline-block;
      padding: 3px 10px; border-radius: 10px;
      font-size: 12px; font-weight: bold;
    }
    .badge-waiting    { background: #ddeeff; color: #1a73e8; border: 1px solid #a8ccf0; }
    .badge-proceeding { background: #d4edda; color: #1a7a3c; border: 1px solid #88c9a0; }
    .badge-complete   { background: #222;    color: #fff;    border: 1px solid #000; }

    /* 드롭다운+Save 묶음 */
    .th-ctrl-combo { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 10px; min-width: 160px; }

    .th-edit { font-size: 13px; font-weight: bold; padding: 10px 14px; background: #fff; min-width: 110px; }

    .btn-col-save {
      height: 30px; width: 62px; font-size: 12px; background: #fff;
      border: 1px solid #bbb; border-radius: 3px;
      cursor: pointer; transition: background .15s;
      white-space: nowrap; overflow: hidden;
    }
    .btn-col-save:hover { background: #e8e8e8; }
    .btn-col-save.saved { border-color: #27ae60; color: #27ae60; }

    .hdr-select {
      height: 30px; padding: 0 8px; font-size: 12px;
      border: 1px solid #bbb; border-radius: 3px;
      background: #fff; cursor: pointer; outline: none; min-width: 80px;
    }
    .hdr-select.waiting    { color: #1a73e8; }
    .hdr-select.proceeding { color: #27ae60; }
    .hdr-select.complete   { color: #111; font-weight: bold; }

    /* ── 데이터 행 ── */
    .td-panel, .td-email {
      font-size: 13px; color: #333; padding: 9px 14px; background: #fff; white-space: nowrap;
    }

    /* 상태 셀: 드롭다운 너비 기준으로 좌우 2열 */
    .td-status {
      padding: 6px 0; background: #fff; min-width: 160px;
    }
    .td-status-inner {
      display: flex; align-items: center; justify-content: center;
    }
    /* 상태 텍스트 — 헤더 드롭다운 너비에 맞춤 */
    .status-text-wrap {
      min-width: 80px; text-align: center;
    }
    .status-text { font-size: 13px; }
    .status-text.waiting    { color: #1a73e8; }
    .status-text.proceeding { color: #27ae60; }
    .status-text.complete   { color: #111; font-weight: bold; }

    /* 수정 버튼 영역 — Save 버튼 너비에 맞춤 */
    .status-edit-wrap {
      width: 62px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-status-edit {
      width: 46px; height: 24px; font-size: 11px;
      background: #f5f5f5; border: 1px solid #ccc;
      border-radius: 3px; color: #555;
      cursor: pointer; transition: background .15s; overflow: hidden;
    }
    .btn-status-edit:hover { background: #e0e0e0; }

    /* 패널 수정/삭제 버튼 */
    .td-action { padding: 6px 10px; background: #fff; white-space: nowrap; min-width: 110px; }
    .btn-modify {
      width: 46px; height: 28px; font-size: 12px; background: #fff;
      border: 1px solid #6a9fd8; border-radius: 3px; color: #1a73e8;
      cursor: pointer; transition: background .15s; margin-right: 4px; overflow: hidden;
    }
    .btn-modify:hover { background: #e8f0fe; }
    .btn-delete {
      width: 46px; height: 28px; font-size: 12px; background: #fff;
      border: 1px solid #e0a0a0; border-radius: 3px; color: #c0392b;
      cursor: pointer; transition: background .15s; overflow: hidden;
    }
    .btn-delete:hover { background: #fde8e8; }

    .state-row td { padding: 36px; color: #aaa; font-size: 13px; }

    /* ── 전체 로딩 오버레이 ── */
    #loadingOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,.85); z-index: 2000;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    #loadingOverlay.active { display: flex; }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 4px solid #ddd; border-top-color: #555;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #666; }

    /* ── 공통 모달 ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.38); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .overlay.active { display: flex; }
    .modal-box {
      background: #fff; border-radius: 6px;
      padding: 36px 40px 30px; width: 400px; max-width: 94vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-box h3 { font-size: 16px; color: #111; margin-bottom: 22px; }
    .field-wrap { margin-bottom: 14px; }
    .field-wrap label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
    .field-wrap input[type="email"],
    .field-wrap input[type="text"] {
      width: 100%; border: 1px solid #ccc; border-radius: 4px;
      padding: 9px 12px; font-size: 14px; outline: none;
      transition: border-color .2s; background: #fafafa;
    }
    .field-wrap input:focus { border-color: #888; background: #fff; }
    .field-wrap input[readonly] { background: #f0f0f0; color: #888; cursor: default; }
    .field-wrap select {
      width: 100%; border: 1px solid #ccc; border-radius: 4px;
      padding: 9px 12px; font-size: 14px; outline: none;
      background: #fafafa; cursor: pointer;
    }
    .field-wrap select:focus { border-color: #888; background: #fff; }
    .modal-msg { font-size: 12px; min-height: 18px; margin-bottom: 12px; }
    .modal-msg.err { color: #c0392b; }
    .modal-msg.ok  { color: #27ae60; }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .modal-actions button {
      flex: 1; padding: 11px 0; font-size: 14px; font-weight: bold;
      border-radius: 4px; cursor: pointer; transition: opacity .2s;
    }
    .modal-actions button:hover { opacity: .85; }
    .modal-actions button:disabled { opacity: .45; cursor: default; }
    .btn-m-cancel  { background: #fff; border: 1.5px solid #ccc; color: #333; }
    .btn-m-confirm { background: #1e1e1e; border: none; color: #fff; }
    .btn-m-delete  { background: #c0392b; border: none; color: #fff; }
    .lo-modal {
      background: #fff; border-radius: 6px;
      padding: 36px 40px 28px; width: 320px; max-width: 92vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.18); text-align: center;
    }
    .lo-modal p { font-size: 15px; color: #333; line-height: 1.7; margin-bottom: 28px; }
  </style>
</head>
<body>

  <!-- 전체 로딩 오버레이 -->
  <div id="loadingOverlay">
    <div class="loading-spinner"></div>
    <span class="loading-text">데이터를 불러오는 중...</span>
  </div>

  <!-- 로그아웃 모달 -->
  <div class="overlay" id="loOverlay">
    <div class="lo-modal">
      <p>로그아웃 하시겠습니까?</p>
      <div class="modal-actions">
        <button class="btn-m-cancel"  id="loCancel">취소</button>
        <button class="btn-m-confirm" id="loConfirm">로그아웃</button>
      </div>
    </div>
  </div>

  <!-- 패널 추가 모달 -->
  <div class="overlay" id="addOverlay">
    <div class="modal-box">
      <h3>패널 추가</h3>
      <div class="field-wrap">
        <label>e-mail *</label>
        <input type="email" id="addEmail" placeholder="이메일 주소를 입력해주세요." />
      </div>
      <div class="field-wrap">
        <label>기타 (etc)</label>
        <input type="text" id="addEtc" placeholder="기타 정보를 입력해주세요. (선택)" />
      </div>
      <p class="modal-msg" id="addMsg"></p>
      <div class="modal-actions">
        <button class="btn-m-cancel"  id="addCancel">취소</button>
        <button class="btn-m-confirm" id="addConfirm">추가</button>
      </div>
    </div>
  </div>

  <!-- 패널 정보 수정 모달 -->
  <div class="overlay" id="modOverlay">
    <div class="modal-box">
      <h3>패널 수정</h3>
      <div class="field-wrap">
        <label>panel_no</label>
        <input type="text" id="modNo" readonly />
      </div>
      <div class="field-wrap">
        <label>e-mail *</label>
        <input type="email" id="modEmail" placeholder="이메일 주소를 입력해주세요." />
      </div>
      <div class="field-wrap">
        <label>기타 (etc)</label>
        <input type="text" id="modEtc" placeholder="기타 정보를 입력해주세요. (선택)" />
      </div>
      <p class="modal-msg" id="modMsg"></p>
      <div class="modal-actions">
        <button class="btn-m-cancel"  id="modCancel">취소</button>
        <button class="btn-m-confirm" id="modConfirm">저장</button>
      </div>
    </div>
  </div>

  <!-- 패널 상태 수정 모달 -->
  <div class="overlay" id="stOverlay">
    <div class="modal-box">
      <h3 id="stTitle">설문 상태 수정</h3>
      <div class="field-wrap">
        <label>panel_no</label>
        <input type="text" id="stNo" readonly />
      </div>
      <div class="field-wrap">
        <label>상태</label>
        <select id="stSelect">
          <option value="대기">대기</option>
          <option value="진행중">진행중</option>
          <option value="완료">완료</option>
        </select>
      </div>
      <p class="modal-msg" id="stMsg"></p>
      <div class="modal-actions">
        <button class="btn-m-cancel"  id="stCancel">취소</button>
        <button class="btn-m-confirm" id="stConfirm">저장</button>
      </div>
    </div>
  </div>

  <!-- 패널 삭제 확인 모달 -->
  <div class="overlay" id="delOverlay">
    <div class="lo-modal">
      <p id="delMsg">이 패널을 삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button class="btn-m-cancel" id="delCancel">취소</button>
        <button class="btn-m-delete" id="delConfirm">삭제</button>
      </div>
    </div>
  </div>

  <!-- 상단 바 -->
  <div class="top-bar">
    <span class="top-bar-email" id="topEmail"></span>
    <button id="btnAddPanel">Add_Panel</button>
    <button id="btnReload">Reload</button>
    <button id="btnLogout">로그아웃</button>
  </div>

  <!-- 메인 테이블 -->
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th class="th-title" rowspan="2" colspan="2">Survey Process Control</th>
          <th class="th-survey" id="thSurvey1"></th>
          <th class="th-survey" id="thSurvey2"></th>
          <th class="th-survey" id="thSurvey3"></th>
          <th class="th-survey" id="thSurvey4"></th>
          <th class="th-edit"   rowspan="2">수정/삭제</th>
        </tr>
        <tr>
          <th><div class="th-ctrl-combo">
            <select class="hdr-select" id="hdrSel1"><option value="대기">대기</option><option value="진행중">진행중</option><option value="완료">완료</option></select>
            <button class="btn-col-save" data-round="1">Save</button>
          </div></th>
          <th><div class="th-ctrl-combo">
            <select class="hdr-select" id="hdrSel2"><option value="대기">대기</option><option value="진행중">진행중</option><option value="완료">완료</option></select>
            <button class="btn-col-save" data-round="2">Save</button>
          </div></th>
          <th><div class="th-ctrl-combo">
            <select class="hdr-select" id="hdrSel3"><option value="대기">대기</option><option value="진행중">진행중</option><option value="완료">완료</option></select>
            <button class="btn-col-save" data-round="3">Save</button>
          </div></th>
          <th><div class="th-ctrl-combo">
            <select class="hdr-select" id="hdrSel4"><option value="대기">대기</option><option value="진행중">진행중</option><option value="완료">완료</option></select>
            <button class="btn-col-save" data-round="4">Save</button>
          </div></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="state-row"><td colspan="7">데이터를 불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

<script>
  /* ════════════════════════════════
     설정
  ════════════════════════════════ */
  const GAS_URL       = 'https://script.google.com/macros/s/AKfycbws4BreiIVwWoUrySkQCG3pFhy3tiY8fXgRgPCSlYdvIpoXrpLwwoD3WuhJHFZllG03nw/exec';
  const PANEL_CSV     = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBQ3YJBvAuWfk6oVrVwhrvekjP4PGmoEDO4XvGvexhp8zlDbX2K2o_dHZMHulA4QcvnvoW_PYrgLl3/pub?gid=1627073953&single=true&output=csv';
  const DELPHI_NO_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBQ3YJBvAuWfk6oVrVwhrvekjP4PGmoEDO4XvGvexhp8zlDbX2K2o_dHZMHulA4QcvnvoW_PYrgLl3/pub?gid=1701744269&single=true&output=csv';

  const ROUND_LABELS = ['1차 설문', '2차 설문', '3차 설문', '4차 설문'];
  const DELPHI_KEYS  = ['1st_delphi','2nd_delphi','3rd_delphi','4th_delphi'];
  const STATUS_KEYS  = ['1st_delphi_status','2nd_delphi_status','3rd_delphi_status','4th_delphi_status'];

  /* 로그인 이메일 표시 */
  const adminEmail = sessionStorage.getItem('adminEmail') || '';
  document.getElementById('topEmail').textContent = adminEmail ? `👤 ${adminEmail}` : '';

  /* ── GAS 호출 ── */
  async function gasCall(payload) {
    const res = await fetch(GAS_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch(e) { return { status: 'error', message: 'GAS 응답 파싱 실패: ' + text }; }
  }

  /* ── CSV 파싱 ── */
  async function fetchCSV(url) {
    const res  = await fetch(url);
    const text = await res.text();
    const lines = text.trim().split(/\r\n|\r|\n/);
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
    return lines.slice(1).filter(l => l.trim() !== '').map(line => {
      const cols = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
        else if (ch===',' && !inQ) { cols.push(cur.trim()); cur=''; }
        else cur+=ch;
      }
      cols.push(cur.trim());
      const row = {};
      headers.forEach((h,i) => { row[h]=(cols[i]||'').replace(/^"|"$/g,'').trim(); });
      return row;
    }).filter(r => r[headers[0]] && r[headers[0]].trim()!=='');
  }

  /* ── 색상 헬퍼 ── */
  function statusCls(val) {
    if (val==='진행중') return 'proceeding';
    if (val==='완료')   return 'complete';
    return 'waiting';
  }
  function badgeCls(val) {
    if (val==='진행중') return 'badge-proceeding';
    if (val==='완료')   return 'badge-complete';
    return 'badge-waiting';
  }
  function syncHdrColor(sel) { sel.className = 'hdr-select ' + statusCls(sel.value); }

  /* ── 헤더 뱃지 업데이트 ── */
  function updateHeaders(delphiNoRows) {
    const map = {};
    delphiNoRows.forEach(r => { map[r['Delphi_no']] = r['check'] || '대기'; });
    DELPHI_KEYS.forEach((key, i) => {
      const check = map[key] || '대기';
      const th = document.getElementById('thSurvey' + (i+1));
      th.innerHTML = `<div class="th-survey-inner">
        <span class="th-survey-label">${ROUND_LABELS[i]}</span>
        <span class="status-badge ${badgeCls(check)}">${check}</span>
      </div>`;
      const sel = document.getElementById('hdrSel' + (i+1));
      if (sel) { sel.value = check; syncHdrColor(sel); }
    });
  }

  /* ── 행 렌더링 ── */
  function makeRow(panel) {
    const tr = document.createElement('tr');
    tr.dataset.no = panel['panel_no'];

    const tdP = document.createElement('td');
    tdP.className = 'td-panel';
    tdP.textContent = panel['panel_no'];
    tr.appendChild(tdP);

    const tdE = document.createElement('td');
    tdE.className = 'td-email';
    tdE.textContent = panel['e-mail'];
    tr.appendChild(tdE);

    STATUS_KEYS.forEach((key, si) => {
      const round = si + 1;
      const val   = panel[key] || '대기';

      const td = document.createElement('td');
      td.className = 'td-status';

      // 내부 flex 컨테이너
      const inner = document.createElement('div');
      inner.className = 'td-status-inner';

      // 상태 텍스트 (드롭다운 너비에 맞춤)
      const textWrap = document.createElement('div');
      textWrap.className = 'status-text-wrap';
      const span = document.createElement('span');
      span.className = `status-text status-col-${round} ${statusCls(val)}`;
      span.textContent = val;
      textWrap.appendChild(span);

      // 수정 버튼 (Save 버튼 너비에 맞춤)
      const editWrap = document.createElement('div');
      editWrap.className = 'status-edit-wrap';
      const btnEdit = document.createElement('button');
      btnEdit.className = 'btn-status-edit';
      btnEdit.textContent = '수정';
      // span을 참조로 넘겨서 저장 후 갱신된 값도 항상 최신값으로 모달에 표시
      btnEdit.addEventListener('click', () => openStModal(panel['panel_no'], round, span.textContent, span));
      editWrap.appendChild(btnEdit);

      inner.appendChild(textWrap);
      inner.appendChild(editWrap);
      td.appendChild(inner);
      tr.appendChild(td);
    });

    const tdAct = document.createElement('td');
    tdAct.className = 'td-action';
    const btnMod = document.createElement('button');
    btnMod.className = 'btn-modify'; btnMod.textContent = '수정';
    btnMod.addEventListener('click', () => openModModal(panel));
    const btnDel = document.createElement('button');
    btnDel.className = 'btn-delete'; btnDel.textContent = '삭제';
    btnDel.addEventListener('click', () => openDelModal(panel['panel_no'], panel['e-mail']));
    tdAct.appendChild(btnMod); tdAct.appendChild(btnDel);
    tr.appendChild(tdAct);

    return tr;
  }

  /* ── 헤더 드롭다운 이벤트 ── */
  [1,2,3,4].forEach(r => {
    const sel = document.getElementById('hdrSel' + r);
    if (sel) sel.addEventListener('change', () => syncHdrColor(sel));
  });

  /* ── 헤더 Save ── */
  document.querySelectorAll('.btn-col-save[data-round]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const round     = Number(btn.dataset.round);
      const statusVal = document.getElementById('hdrSel' + round).value;
      btn.disabled = true; btn.textContent = '저장 중…';
      try {
        const result = await gasCall({ action: 'updateDelphiNo', round, check: statusVal });
        if (result.status !== 'ok') throw new Error(result.message);
        const th = document.getElementById('thSurvey' + round);
        th.innerHTML = `<div class="th-survey-inner">
          <span class="th-survey-label">${ROUND_LABELS[round-1]}</span>
          <span class="status-badge ${badgeCls(statusVal)}">${statusVal}</span>
        </div>`;
        btn.textContent = 'Saved ✓'; btn.classList.add('saved');
        setTimeout(() => { btn.textContent='Save'; btn.classList.remove('saved'); btn.disabled=false; }, 1800);
      } catch(e) {
        alert('저장 실패: ' + e.message); btn.textContent='Save'; btn.disabled=false;
      }
    });
  });

  /* ── 데이터 로드 ── */
  const loadingOverlay = document.getElementById('loadingOverlay');

  async function loadAll() {
    // 스크롤 맨 위로, 표 비우고, 로딩 오버레이 표시
    window.scrollTo({ top: 0, behavior: 'instant' });
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    loadingOverlay.classList.add('active');
    try {
      const [panelRows, delphiNoRows] = await Promise.all([fetchCSV(PANEL_CSV), fetchCSV(DELPHI_NO_CSV)]);
      updateHeaders(delphiNoRows);
      const filtered = panelRows.filter(r => r['panel_no'] && r['panel_no'].trim() !== '');
      console.log('[loadAll] 첫 번째 패널:', filtered[0]);
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="7">등록된 패널이 없습니다.</td></tr>';
      } else {
        filtered.forEach(p => tbody.appendChild(makeRow(p)));
      }
    } catch(e) {
      tbody.innerHTML = `<tr class="state-row"><td colspan="7">로드 실패: ${e.message}</td></tr>`;
    } finally {
      loadingOverlay.classList.remove('active');
    }
  }

  /* ── 로그아웃 ── */
  const loOverlay = document.getElementById('loOverlay');
  document.getElementById('btnLogout').addEventListener('click', () => loOverlay.classList.add('active'));
  document.getElementById('loCancel').addEventListener('click',  () => loOverlay.classList.remove('active'));
  document.getElementById('loConfirm').addEventListener('click', () => { sessionStorage.clear(); location.href='index.html'; });
  loOverlay.addEventListener('click', e => { if(e.target===loOverlay) loOverlay.classList.remove('active'); });

  /* ── Reload ── */
  document.getElementById('btnReload').addEventListener('click', () => loadAll());

  /* ── 패널 추가 ── */
  const addOverlay = document.getElementById('addOverlay');
  const addMsgEl   = document.getElementById('addMsg');
  const addConfirm = document.getElementById('addConfirm');

  document.getElementById('btnAddPanel').addEventListener('click', () => {
    document.getElementById('addEmail').value=''; document.getElementById('addEtc').value='';
    addMsgEl.textContent=''; addMsgEl.className='modal-msg';
    addOverlay.classList.add('active');
    setTimeout(()=>document.getElementById('addEmail').focus(), 80);
  });
  document.getElementById('addCancel').addEventListener('click', ()=>addOverlay.classList.remove('active'));
  addOverlay.addEventListener('click', e=>{ if(e.target===addOverlay) addOverlay.classList.remove('active'); });

  addConfirm.addEventListener('click', async () => {
    const email=document.getElementById('addEmail').value.trim();
    const etc  =document.getElementById('addEtc').value.trim();
    if (!email||!email.includes('@')) {
      addMsgEl.textContent='올바른 이메일 주소를 입력해주세요.'; addMsgEl.className='modal-msg err'; return;
    }
    addConfirm.disabled=true; addConfirm.textContent='추가 중…'; addMsgEl.textContent='';
    try {
      const result=await gasCall({action:'addPanel',email,etc});
      if (result.status==='ok') {
        addMsgEl.textContent='패널이 추가되었습니다.'; addMsgEl.className='modal-msg ok';
        setTimeout(async()=>{ addOverlay.classList.remove('active'); await loadAll(); }, 800);
      } else { addMsgEl.textContent='추가 실패: '+result.message; addMsgEl.className='modal-msg err'; }
    } catch(e) { addMsgEl.textContent='오류: '+e.message; addMsgEl.className='modal-msg err'; }
    finally { addConfirm.disabled=false; addConfirm.textContent='추가'; }
  });
  document.getElementById('addEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') addConfirm.click(); });

  /* ── 패널 정보 수정 ── */
  const modOverlay=document.getElementById('modOverlay');
  const modMsgEl  =document.getElementById('modMsg');
  const modConfirm=document.getElementById('modConfirm');

  function openModModal(panel) {
    document.getElementById('modNo').value    = panel['panel_no']||'';
    document.getElementById('modEmail').value = panel['e-mail']  ||'';
    document.getElementById('modEtc').value   = panel['etc']     ||'';
    modMsgEl.textContent=''; modMsgEl.className='modal-msg';
    modOverlay.classList.add('active');
    setTimeout(()=>document.getElementById('modEmail').focus(), 80);
  }
  document.getElementById('modCancel').addEventListener('click', ()=>modOverlay.classList.remove('active'));
  modOverlay.addEventListener('click', e=>{ if(e.target===modOverlay) modOverlay.classList.remove('active'); });

  modConfirm.addEventListener('click', async () => {
    const panelNo=document.getElementById('modNo').value;
    const email  =document.getElementById('modEmail').value.trim();
    const etc    =document.getElementById('modEtc').value.trim();
    if (!email||!email.includes('@')) {
      modMsgEl.textContent='올바른 이메일 주소를 입력해주세요.'; modMsgEl.className='modal-msg err'; return;
    }
    modConfirm.disabled=true; modConfirm.textContent='저장 중…'; modMsgEl.textContent='';
    try {
      const result=await gasCall({action:'modifyPanel',panel_no:panelNo,email,etc});
      if (result.status==='ok') {
        modMsgEl.textContent='수정되었습니다.'; modMsgEl.className='modal-msg ok';
        const tr=document.querySelector(`#tableBody tr[data-no="${panelNo}"]`);
        if (tr) tr.querySelector('.td-email').textContent=email;
        setTimeout(()=>modOverlay.classList.remove('active'), 800);
      } else { modMsgEl.textContent='수정 실패: '+result.message; modMsgEl.className='modal-msg err'; }
    } catch(e) { modMsgEl.textContent='오류: '+e.message; modMsgEl.className='modal-msg err'; }
    finally { modConfirm.disabled=false; modConfirm.textContent='저장'; }
  });

  /* ── 패널 상태 수정 ── */
  const stOverlay=document.getElementById('stOverlay');
  const stMsgEl  =document.getElementById('stMsg');
  const stConfirm=document.getElementById('stConfirm');
  let stPanelNo=null, stRound=null, stSpan=null;

  function openStModal(panelNo, round, currentVal, span) {
    stPanelNo=panelNo; stRound=round; stSpan=span;
    document.getElementById('stTitle').textContent = `${ROUND_LABELS[round-1]} 상태 수정`;
    document.getElementById('stNo').value = panelNo;
    // 현재 상태값 드롭다운에 반영
    document.getElementById('stSelect').value = currentVal || '대기';
    stMsgEl.textContent=''; stMsgEl.className='modal-msg';
    stOverlay.classList.add('active');
  }
  document.getElementById('stCancel').addEventListener('click', ()=>{ stOverlay.classList.remove('active'); stPanelNo=null; });
  stOverlay.addEventListener('click', e=>{ if(e.target===stOverlay){ stOverlay.classList.remove('active'); stPanelNo=null; } });

  stConfirm.addEventListener('click', async () => {
    if (!stPanelNo||!stRound) return;
    const newStatus=document.getElementById('stSelect').value;
    stConfirm.disabled=true; stConfirm.textContent='저장 중…'; stMsgEl.textContent='';
    try {
      const result=await gasCall({action:'updatePanelStatus',panel_no:stPanelNo,round:stRound,status:newStatus});
      if (result.status==='ok') {
        stMsgEl.textContent='저장되었습니다.'; stMsgEl.className='modal-msg ok';
        if (stSpan) {
          stSpan.textContent=newStatus;
          stSpan.className=`status-text status-col-${stRound} ${statusCls(newStatus)}`;
          // 수정 버튼 클릭 시 현재값 갱신을 위해 btn의 closure도 업데이트 필요 → span 참조로 처리됨
        }
        setTimeout(()=>{ stOverlay.classList.remove('active'); stPanelNo=null; }, 800);
      } else { stMsgEl.textContent='저장 실패: '+result.message; stMsgEl.className='modal-msg err'; }
    } catch(e) { stMsgEl.textContent='오류: '+e.message; stMsgEl.className='modal-msg err'; }
    finally { stConfirm.disabled=false; stConfirm.textContent='저장'; }
  });

  /* ── 패널 삭제 ── */
  const delOverlay=document.getElementById('delOverlay');
  let pendingDelNo=null;

  function openDelModal(panelNo, email) {
    pendingDelNo=panelNo;
    document.getElementById('delMsg').textContent=`"${email}" 패널을 삭제하시겠습니까?`;
    delOverlay.classList.add('active');
  }
  document.getElementById('delCancel').addEventListener('click', ()=>{ delOverlay.classList.remove('active'); pendingDelNo=null; });
  delOverlay.addEventListener('click', e=>{ if(e.target===delOverlay){ delOverlay.classList.remove('active'); pendingDelNo=null; } });

  document.getElementById('delConfirm').addEventListener('click', async () => {
    if (!pendingDelNo) return;
    const btn=document.getElementById('delConfirm');
    btn.disabled=true; btn.textContent='삭제 중…';
    try {
      const result=await gasCall({action:'deletePanel',panel_no:pendingDelNo});
      if (result.status==='ok') { delOverlay.classList.remove('active'); pendingDelNo=null; await loadAll(); }
      else alert('삭제 실패: '+result.message);
    } catch(e) { alert('오류: '+e.message); }
    finally { btn.disabled=false; btn.textContent='삭제'; }
  });

  /* ESC 공통 */
  document.addEventListener('keydown', e=>{
    if (e.key==='Escape')
      [loOverlay,addOverlay,modOverlay,stOverlay,delOverlay].forEach(o=>o.classList.remove('active'));
  });

  /* 초기 로드 */
  loadAll();
</script>
</body>
</html>
